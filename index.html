<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>JBZD Feed</title>

<style>

body{
margin:0;
background:#000;
color:#fff;
font-family:Arial,sans-serif;
}

#feed{
max-width:720px;
margin:auto;
}

.meme{
display:flex;
justify-content:center;
align-items:center;
padding:20px;
border-bottom:1px solid #222;
}

.meme img{
max-width:100%;
max-height:90vh;
object-fit:contain;
}

.loader{
text-align:center;
padding:30px;
color:#888;
}

button{
display:block;
margin:30px auto;
padding:12px 25px;
border:0;
border-radius:8px;
cursor:pointer;
font-size:16px;
}


</style>

</head>


<body>


<div id="feed"></div>


<div class="loader" id="loader">
Ładowanie...
</div>


<button id="more">
Załaduj więcej
</button>




<script>


let page=1;

let busy=false;

let loaded=new Set();



const proxies=[


url =>
"https://api.allorigins.win/raw?url="
+encodeURIComponent(url),


url =>
"https://api.codetabs.com/v1/proxy?quest="
+encodeURIComponent(url),


url =>
"https://api.allorigins.win/get?url="
+encodeURIComponent(url)



];





async function fetchPage(url){


for(let p of proxies){


try{


let r=await fetch(p(url),{
cache:"no-store"
});


if(!r.ok)
continue;


let text=await r.text();



try{


let json=JSON.parse(text);


if(json.contents)
text=json.contents;


}catch(e){}



if(text.length>200)
return text;



}catch(e){}



}



throw Error("proxy error");


}






function normalize(src,url){


if(!src)
return null;


src=src.trim();


src=src.replace(/^['"]|['"]$/g,"");



if(src.startsWith("//"))
src="https:"+src;



if(src.startsWith("/"))
src=new URL(src,url).href;



if(!/^https?:\/\//i.test(src))
return null;



return src;


}







function bad(src){


return (

src.includes("logo")||
src.includes("avatar")||
src.includes("icon")||
src.includes("emoji")||
src.includes("sprite")||
src.includes("ads")||
src.includes("pixel")||
src.endsWith(".svg")

);


}






function add(src){


if(loaded.has(src))
return;


loaded.add(src);



let test=new Image();



test.onload=function(){


if(test.width<300)
return;



let div=document.createElement("div");

div.className="meme";



let img=document.createElement("img");

img.loading="lazy";

img.src=src;



div.appendChild(img);



document
.getElementById("feed")
.appendChild(div);



};



test.src=src;



}







function extract(html,url){


let doc =
new DOMParser()
.parseFromString(html,"text/html");



let found=new Set();



doc.querySelectorAll("*").forEach(el=>{


[
"src",
"data-src",
"data-original",
"data-lazy-src",
"srcset",
"data-srcset",
"content"
].forEach(a=>{


let v=el.getAttribute(a);


if(!v)
return;



if(v.includes("http")||v.startsWith("/")){


if(v.includes(",")){


v=v.split(",")[0];


}


found.add(v);


}


});



});




found.forEach(src=>{


src=normalize(src,url);


if(!src)
return;


if(bad(src))
return;



add(src);



});



}








async function load(){


if(busy)
return;


busy=true;



let url =
page===1
?
"https://jbzd.pl/"
:
`https://jbzd.pl/str/${page}`;



try{


let html=await fetchPage(url);


extract(html,url);



}catch(e){

console.log(e);

}



busy=false;


}





document
.getElementById("more")
.onclick=function(){

page++;

load();

};




load();



</script>


</body>
</html>
