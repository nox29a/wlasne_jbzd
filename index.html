<!DOCTYPE html>
<html lang="pl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>JBZD Feed</title>

<style>

body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial,sans-serif;
}

#feed{
    max-width:720px;
    margin:auto;
}

.meme{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    border-bottom:1px solid #111;
    padding:20px;
}

.meme img{
    max-width:100%;
    max-height:90vh;
    object-fit:contain;
}

.loader{
    text-align:center;
    padding:30px;
    color:#888;
}

button{
    display:block;
    margin:20px auto;
    padding:12px 25px;
    border-radius:8px;
    border:0;
    cursor:pointer;
    font-size:16px;
}

</style>

</head>

<body>


<div id="feed"></div>


<div class="loader" id="loader">
Ładowanie memów...
</div>


<button id="more">
Załaduj więcej
</button>



<script>


let page = 1;

let loading = false;

let loaded = new Set();



const feed =
document.getElementById("feed");





async function fetchJBZD(url){


const response = await fetch(
    "/api/proxy?url=" +
    encodeURIComponent(url)
);


if(!response.ok){

    throw new Error(
        "HTTP " + response.status
    );

}


return await response.text();


}





function absoluteUrl(src,base){


if(!src)
    return null;


src = src.trim();


if(src.startsWith("//"))
    src = "https:" + src;


if(src.startsWith("/"))
    src = new URL(src,base).href;


if(!src.startsWith("http"))
    return null;


return src;


}





function isBad(src){


return (

src.includes("logo") ||
src.includes("avatar") ||
src.includes("icon") ||
src.includes("emoji") ||
src.includes("sprite") ||
src.includes("favicon") ||
src.includes("ads") ||
src.endsWith(".svg")

);


}






function addImage(src){


if(loaded.has(src))
    return;


loaded.add(src);



let test = new Image();



test.onload = function(){


if(test.width < 300)
    return;



let div =
document.createElement("div");


div.className="meme";



let img =
document.createElement("img");


img.src=src;

img.loading="lazy";


div.appendChild(img);


feed.appendChild(div);



};



test.src=src;



}






function extractImages(html,pageUrl){


const doc =
new DOMParser()
.parseFromString(html,"text/html");



let urls = new Set();




doc.querySelectorAll("img").forEach(img=>{


[
"src",
"data-src",
"data-original",
"data-lazy-src",
"srcset",
"data-srcset"

].forEach(attr=>{


let value =
img.getAttribute(attr);



if(!value)
    return;



if(value.includes(",")){


value =
value.split(",")[0]
.trim()
.split(" ")[0];


}



urls.add(value);



});


});





urls.forEach(src=>{


src =
absoluteUrl(src,pageUrl);



if(!src)
    return;



if(isBad(src))
    return;



addImage(src);



});



}






async function loadPage(){


if(loading)
    return;


loading=true;



document
.getElementById("loader")
.style.display="block";



let url =
page===1
?
"https://jbzd.pl/"
:
`https://jbzd.pl/str/${page}`;



try{


const html =
await fetchJBZD(url);



extractImages(html,url);



}catch(e){

console.error(
"Błąd:",
e
);

}



loading=false;


document
.getElementById("loader")
.style.display="none";


}







document
.getElementById("more")
.onclick=function(){

page++;

loadPage();

};




loadPage();



</script>


</body>
</html>
