<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MemeFeed</title>

<style>

body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
overflow-x:hidden;
}

#feed{
max-width:720px;
margin:auto;
}

.meme{
position:relative;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
border-bottom:1px solid #111;
scroll-snap-align:start;
}

.meme img{
max-width:100%;
max-height:90vh;
object-fit:contain;
}

.meme-controls{
position:absolute;
right:14px;
top:50%;
transform:translateY(-50%);
display:flex;
flex-direction:column;
gap:8px;
z-index:2;
}

.meme-controls button{
border:1px solid #333;
background:rgba(20,20,20,0.9);
color:#fff;
padding:8px 12px;
border-radius:10px;
cursor:pointer;
font-size:14px;
}

.meme-controls button:hover{
background:rgba(40,40,40,0.95);
}

#imageModal{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
background:rgba(0,0,0,0.92);
z-index:999;
padding:20px;
box-sizing:border-box;
}

#imageModal.open{
display:flex;
}

#imageModal img{
max-width:100%;
max-height:100%;
object-fit:contain;
}

.loader{
text-align:center;
padding:30px;
color:#888;
}

@media(max-width:700px){

body{
scroll-snap-type:y mandatory;
}

.meme{
height:100vh;
}

.meme-controls{
right:10px;
bottom:10px;
top:auto;
transform:none;
flex-direction:row;
}

.meme-controls button{
padding:7px 10px;
font-size:13px;
}

}

</style>
</head>

<body>

<div id="feed"></div>
<div class="loader" id="loader">ładowanie memów...</div>
<div class="loader" id="runtimeWarning" style="display:none;"></div>

<div id="imageModal" aria-hidden="true">
<img id="modalImage" alt="Powiększony obrazek">
</div>

<script>

const proxyBuilders=[
url=>`https://corsproxy.io/?${url}`,
url=>`https://cors.isomorphic-git.org/${url}`,
url=>`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
url=>`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`
]

const runtimeWarning=document.getElementById("runtimeWarning")

if(location.protocol==="file:"){
runtimeWarning.style.display="block"
runtimeWarning.textContent="Uruchom ten plik przez lokalny serwer (np. python3 -m http.server 8080), bo tryb file:// często blokuje CORS i dalsze strony się nie ładują."
}

async function fetchPageHTML(url){
let lastError=null

for(const buildProxyURL of proxyBuilders){
let timeoutId=null
try{
const proxiedURL=buildProxyURL(url)
const controller=new AbortController()
timeoutId=setTimeout(()=>controller.abort(),9000)
const res=await fetch(proxiedURL,{
cache:"no-store",
signal:controller.signal,
headers:{Accept:"text/html,text/plain,*/*"}
})
clearTimeout(timeoutId)

if(!res.ok){
throw new Error(`HTTP ${res.status}`)
}

const html=await res.text()

if(!html || html.length<100){
throw new Error("pusta odpowiedz")
}

return html
}catch(err){
if(timeoutId) clearTimeout(timeoutId)
lastError=err
}
}

throw lastError || new Error("wszystkie proxy nie dzialaja")
}

const sources=[

p=>p===1
?"https://jbzd.pl/"
:`https://jbzd.pl/str/${p}`,

p=>p===1
?"https://kwejk.pl/"
:`https://kwejk.pl/strona/${p}`

]

let page=1
let loading=false

const loaded=new Set()
const imageModal=document.getElementById("imageModal")
const modalImage=document.getElementById("modalImage")

function openModal(src){
modalImage.src=src
imageModal.classList.add("open")
imageModal.setAttribute("aria-hidden","false")
}

function closeModal(){
imageModal.classList.remove("open")
imageModal.setAttribute("aria-hidden","true")
modalImage.removeAttribute("src")
}

async function downloadImage(src){
try{
const res=await fetch(src)
if(!res.ok) throw new Error("download failed")
const blob=await res.blob()
const blobUrl=URL.createObjectURL(blob)
const a=document.createElement("a")
a.href=blobUrl
a.download=`meme-${Date.now()}.${(blob.type.split("/")[1]||"jpg").split(";")[0]}`
document.body.appendChild(a)
a.click()
a.remove()
setTimeout(()=>URL.revokeObjectURL(blobUrl),1000)
}catch(e){
const a=document.createElement("a")
a.href=src
a.target="_blank"
a.rel="noopener"
a.download=""
document.body.appendChild(a)
a.click()
a.remove()
}
}

function normalizeURL(src,base){

if(!src) return null

if(src.startsWith("//")){
src="https:"+src
}

if(src.startsWith("/")){
src=new URL(src,base).href
}

if(src.includes(" ")) return null

return src
}

function isBad(src){

return(

src.includes("logo") ||
src.includes("avatar") ||
src.includes("icon") ||
src.includes("sprite") ||
src.includes("ads") ||
src.includes("thumb") ||
src.endsWith(".svg") ||
src.endsWith(".webp?") ||
src.includes("pixel")

)

}

function addImage(src){

if(loaded.has(src)) return
loaded.add(src)

const test=new Image()

test.onload=function(){

if(test.width<500) return

const feed=document.getElementById("feed")

const div=document.createElement("div")
div.className="meme"

const img=document.createElement("img")
img.loading="lazy"
img.src=src

const controls=document.createElement("div")
controls.className="meme-controls"

const zoomBtn=document.createElement("button")
zoomBtn.type="button"
zoomBtn.textContent="Powiększ"
zoomBtn.addEventListener("click",()=>openModal(src))

const downloadBtn=document.createElement("button")
downloadBtn.type="button"
downloadBtn.textContent="Pobierz"
downloadBtn.addEventListener("click",()=>downloadImage(src))

controls.appendChild(zoomBtn)
controls.appendChild(downloadBtn)

div.appendChild(img)
div.appendChild(controls)

feed.appendChild(div)

}

test.src=src

}

function extractImages(doc,url){

const imgs=doc.querySelectorAll("img")

imgs.forEach(img=>{

let src=

img.dataset.src ||
img.dataset.original ||
img.getAttribute("data-src") ||
img.getAttribute("data-original") ||
img.getAttribute("srcset") ||
img.src

if(src && src.includes(",")){
src=src.split(",")[0]
}

src=normalizeURL(src,url)

if(!src) return

if(isBad(src)) return

addImage(src)

})

}

async function loadSource(source){

const url=source(page)

try{

const html=await fetchPageHTML(url)

const doc=new DOMParser().parseFromString(html,"text/html")

extractImages(doc,url)

}catch(e){
console.log("błąd źródła",url,e?.message||e)
}

}

async function loadMemes(){

if(loading) return
loading=true

document.getElementById("loader").style.display="block"

for(const s of sources){
await loadSource(s)
}

page++

loading=false

document.getElementById("loader").style.display="none"

}

function preload(){

if(
window.innerHeight+window.scrollY>
document.body.offsetHeight-2000
){
loadMemes()
}

}

imageModal.addEventListener("click",(e)=>{
if(e.target===imageModal) closeModal()
})

window.addEventListener("keydown",(e)=>{
if(e.key==="Escape") closeModal()
})

window.addEventListener("scroll",preload)

loadMemes()
loadMemes()

</script>

</body>
</html>
