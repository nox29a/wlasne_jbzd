<!DOCTYPE html>
<html lang="pl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Lepsze JBZD</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#000;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

h1{
    margin-bottom:30px;
}

#images{
    max-width:700px;
    margin:auto;
}

.image-container{

    background:#111;
    padding:15px;
    margin:25px auto;
    border-radius:10px;

}

.image-container img{

    max-width:100%;
    max-height:90vh;
    display:block;
    margin:auto;

}

h3{

    margin:10px;

}

.description{

    color:#ccc;
    font-size:14px;

}


button{

    padding:12px 25px;
    margin:30px;
    cursor:pointer;
    border-radius:8px;
    border:0;
    font-size:16px;

}

</style>

</head>


<body>


<h1>Lepsze JBZD</h1>


<div id="images"></div>


<button id="loadMoreBtn">
Załaduj więcej
</button>



<script>


let currentPage = 1;

let loadedImages = new Set();



const proxy =
"https://api.codetabs.com/v1/proxy?quest=";



function fixUrl(src){


    if(!src)
        return null;


    src=src.trim();


    if(src.startsWith("//"))
        src="https:"+src;


    if(src.startsWith("/"))
        src="https://jbzd.com.pl"+src;



    return src;

}





async function loadImagesFromUrl(url){


try{


const response = await fetch(
    proxy + encodeURIComponent(url)
);


if(!response.ok)
    throw Error(response.status);



const html = await response.text();



const doc =
new DOMParser()
.parseFromString(html,"text/html");



let imgs =
doc.querySelectorAll("img");



imgs.forEach(img=>{


let src =

img.dataset.src ||

img.dataset.lazy ||

img.dataset.original ||

img.getAttribute("data-src") ||

img.getAttribute("src");



src=fixUrl(src);



if(!src)
    return;



if(loadedImages.has(src))
    return;



if(

src.includes("logo") ||
src.includes("avatar") ||
src.includes("icon") ||
src.includes("emoji") ||
src.includes("sprite")

)
return;



if(
src.endsWith(".svg")
)
return;



loadedImages.add(src);



let test=new Image();



test.onload=function(){



if(test.width < 400)
    return;



createCard(src,img);



};



test.src=src;



});



}

catch(e){

console.log(
"Błąd:",
e
);

}



}





function createCard(src,sourceImg){



const box=
document.createElement("div");


box.className=
"image-container";



let article =
sourceImg.closest("article");



if(article){


let title =
article.querySelector("h1,h2,h3");


if(title){


let h=document.createElement("h3");

h.textContent=
title.textContent.trim();


box.appendChild(h);


}



}



let img =
document.createElement("img");


img.loading="lazy";

img.src=src;


box.appendChild(img);



document
.getElementById("images")
.appendChild(box);



}





function loadPage(){


let url;


if(currentPage===1)

url="https://jbzd.com.pl/";

else

url=
`https://jbzd.com.pl/str/${currentPage}`;



loadImagesFromUrl(url);



}





document
.getElementById("loadMoreBtn")
.onclick=function(){


currentPage++;

loadPage();


};





loadPage();



</script>


</body>
</html>
