<!DOCTYPE html>
<html lang="pl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Lepsze JBZD</title>

<style>

body{
margin:0;
background:#000;
color:#fff;
font-family:Arial,sans-serif;
text-align:center;
padding:20px;
}

h1{
margin-bottom:30px;
}

#images{
max-width:700px;
margin:auto;
}

.image-container{

background:#111;
padding:15px;
margin:25px auto;
border-radius:10px;

}

.image-container img{

max-width:100%;
height:auto;
display:block;
margin:auto;

}

.description{

color:#aaa;
font-size:14px;
margin-top:10px;

}

button{

background:white;
color:black;
border:0;
padding:12px 25px;
font-size:16px;
border-radius:8px;
cursor:pointer;
margin:30px;

}

</style>

</head>


<body>


<h1>Lepsze JBZD</h1>


<div id="images"></div>


<button id="loadMoreBtn">
Załaduj więcej
</button>



<script>


let currentPage=1;

let loading=false;

let loaded=new Set();



const proxyList=[

url =>
"https://api.allorigins.win/raw?url="
+encodeURIComponent(url),


url =>
"https://api.codetabs.com/v1/proxy?quest="
+encodeURIComponent(url)

];





async function getHTML(url){


for(let proxy of proxyList){


try{


let r=await fetch(proxy(url),{
cache:"no-store"
});


if(!r.ok)
continue;


let text=await r.text();


if(text.length>100)
return text;


}catch(e){}



}


throw Error("Brak odpowiedzi proxy");


}






function fixUrl(src,base){


if(!src)
return null;


src=src.trim();


if(src.startsWith("//"))
src="https:"+src;


if(src.startsWith("/"))
src=new URL(src,base).href;


if(!src.startsWith("http"))
return null;


return src;


}





function badImage(src){


return(

src.includes("logo")||
src.includes("avatar")||
src.includes("icon")||
src.includes("emoji")||
src.includes("sprite")||
src.includes("ads")||
src.includes("pixel")||
src.endsWith(".svg")

);


}






function addImage(src){


if(loaded.has(src))
return;


loaded.add(src);



let test=new Image();



test.onload=function(){


if(test.width<400)
return;



let box=document.createElement("div");

box.className="image-container";



let img=document.createElement("img");

img.src=src;

img.loading="lazy";



box.appendChild(img);



document
.getElementById("images")
.appendChild(box);



};



test.src=src;



}







function extractImages(html,url){


let doc=
new DOMParser()
.parseFromString(html,"text/html");



doc.querySelectorAll("img").forEach(img=>{


let src=


img.dataset.src ||

img.dataset.lazySrc ||

img.dataset.original ||

img.getAttribute("data-src") ||

img.getAttribute("data-original") ||

img.getAttribute("src") ||

img.getAttribute("srcset");



if(!src)
return;



if(src.includes(",")){


src=
src.split(",")[0]
.trim()
.split(" ")[0];


}



src=fixUrl(src,url);



if(!src)
return;



if(badImage(src))
return;



addImage(src);



});



}







async function loadPage(){


if(loading)
return;


loading=true;



let url;



if(currentPage===1)

url="https://jbzd.pl/";

else

url=
`https://jbzd.pl/str/${currentPage}`;





try{


let html=await getHTML(url);


extractImages(html,url);



}catch(e){


console.log(e);


}



loading=false;


}







document
.getElementById("loadMoreBtn")
.onclick=function(){


currentPage++;

loadPage();


};




loadPage();



</script>


</body>
</html>
