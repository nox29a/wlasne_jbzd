<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lepsze Memy</title>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
margin:0;
padding:0;
text-align:center;
}

h1{
margin:20px 0;
}

.controls{
margin-bottom:20px;
}

button{
padding:10px 16px;
margin:6px;
border-radius:8px;
border:none;
background:#222;
color:white;
cursor:pointer;
font-size:14px;
}

button:hover{
background:#444;
}

#images{
column-count:4;
column-gap:10px;
padding:10px;
}

@media(max-width:1200px){
#images{column-count:3;}
}

@media(max-width:800px){
#images{column-count:2;}
}

@media(max-width:500px){
#images{column-count:1;}
}

.image-box{
break-inside:avoid;
margin-bottom:10px;
border-radius:10px;
overflow:hidden;
background:#111;
}

.image-box img{
width:100%;
display:block;
transition:transform .25s;
}

.image-box img:hover{
transform:scale(1.05);
}

.loader{
padding:40px;
font-size:18px;
color:#888;
}

</style>
</head>
<body>

<h1>Lepsze Memy</h1>

<div class="controls">

<button onclick="switchSource('jbzd')">JBZD</button>
<button onclick="switchSource('memy')">MEMY.PL</button>
<button onclick="switchSource('obrazkowo')">OBRAZKOWO</button>
<button onclick="switchSource('kwejk')">KWEJK</button>

</div>

<div id="images"></div>

<div class="loader" id="loader">
Ładowanie memów...
</div>

<script>

let currentPage = 1
let currentSource = "jbzd"
let loading = false

const proxy = "https://api.allorigins.win/raw?url="

const loadedImages = new Set()

function switchSource(source){

currentSource = source
currentPage = 1
loadedImages.clear()

document.getElementById("images").innerHTML=""

loadImages()

}

function getUrl(){

if(currentSource==="jbzd"){
return currentPage===1
? "https://jbzd.pl/"
: `https://jbzd.pl/str/${currentPage}`
}

if(currentSource==="memy"){
return `https://memy.pl/?page=${currentPage}`
}

if(currentSource==="obrazkowo"){
return `https://obrazkowo.pl/best?page=${currentPage}`
}

if(currentSource==="kwejk"){
return currentPage===1
? "https://kwejk.pl/"
: `https://kwejk.pl/strona/${currentPage}`
}

}

function getBase(){

if(currentSource==="memy") return "https://memy.pl"
if(currentSource==="obrazkowo") return "https://obrazkowo.pl"
if(currentSource==="kwejk") return "https://kwejk.pl"

return "https://jbzd.pl"

}

async function loadImages(){

if(loading) return
loading = true

document.getElementById("loader").style.display="block"

try{

const url = getUrl() + "?t=" + Date.now()

const res = await fetch(proxy + encodeURIComponent(url))

const html = await res.text()

const doc = new DOMParser().parseFromString(html,"text/html")

const imgs = doc.querySelectorAll("img")

const container = document.getElementById("images")

imgs.forEach(img=>{

let src =
img.getAttribute("data-src") ||
img.getAttribute("data-original") ||
img.getAttribute("src")

if(!src) return

if(src.startsWith("//")){
src = "https:" + src
}

if(src.startsWith("/")){
src = getBase() + src
}

if(
src.includes("logo") ||
src.includes("avatar") ||
src.includes("thumb") ||
src.endsWith(".svg")
) return

if(loadedImages.has(src)) return

loadedImages.add(src)

const test = new Image()
test.src = src

test.onload = ()=>{

if(test.width < 350) return

const box = document.createElement("div")
box.className="image-box"

const image = document.createElement("img")
image.src = src
image.loading="lazy"

box.appendChild(image)

container.appendChild(box)

}

})

currentPage++

}catch(e){

console.log("Błąd",e)

}

loading = false
document.getElementById("loader").style.display="none"

}

window.addEventListener("scroll",()=>{

if(
window.innerHeight + window.scrollY
>= document.body.offsetHeight - 1200
){
loadImages()
}

})

loadImages()

</script>

</body>
</html>
