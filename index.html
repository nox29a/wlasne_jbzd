<!DOCTYPE html>
<html lang="pl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>JBZD Feed</title>

<style>

body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
}

#feed{
max-width:720px;
margin:auto;
}

.meme{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
border-bottom:1px solid #111;
padding:15px;
}

.meme img{
max-width:100%;
max-height:90vh;
object-fit:contain;
}

.loader{
text-align:center;
padding:25px;
color:#888;
}

button{
display:block;
margin:20px auto;
padding:12px 25px;
border-radius:8px;
border:0;
cursor:pointer;
}

</style>

</head>


<body>


<div id="feed"></div>

<div id="loader" class="loader">
Ładowanie...
</div>

<button id="more">
Załaduj więcej
</button>




<script>


let page=1;

let loading=false;

let loadedImages=new Set();

let loadedPages=new Set();



async function fetchJBZD(url){


console.log("Pobieram:",url);


let r=await fetch(
"/api/proxy?url="+encodeURIComponent(url)
);


if(!r.ok)
throw Error(r.status);


return await r.text();


}





function fixUrl(src,base){


if(!src)
return null;


src=src.trim();


if(src.startsWith("//"))
src="https:"+src;


if(src.startsWith("/"))
src=new URL(src,base).href;


return src;


}





function bad(src){


return(

src.includes("logo")||
src.includes("avatar")||
src.includes("icon")||
src.includes("emoji")||
src.includes("sprite")||
src.includes("favicon")||
src.endsWith(".svg")

);


}





function addImage(src){


if(loadedImages.has(src))
return;


loadedImages.add(src);



let test=new Image();



test.onload=function(){


if(test.width<300)
return;


let box=document.createElement("div");

box.className="meme";



let img=document.createElement("img");

img.src=src;

img.loading="lazy";



box.appendChild(img);


document
.getElementById("feed")
.appendChild(box);



};



test.src=src;


}







function extractImages(html,url){


let doc=
new DOMParser()
.parseFromString(html,"text/html");



let found=new Set();



doc.querySelectorAll("img").forEach(img=>{


[
"src",
"data-src",
"data-original",
"data-lazy-src",
"srcset",
"data-srcset"

].forEach(a=>{


let v=img.getAttribute(a);


if(!v)
return;



if(v.includes(","))

v=v.split(",")[0]
.trim()
.split(" ")[0];



found.add(v);



});


});



found.forEach(src=>{


src=fixUrl(src,url);



if(!src)
return;


if(bad(src))
return;



addImage(src);



});


}





async function loadPage(){


if(loading)
return;


if(loadedPages.has(page))
return;


loading=true;


loadedPages.add(page);



let urls=[


`https://jbzd.pl/str/${page}`,


`https://jbzd.pl/?page=${page}`,


`https://jbzd.pl/?p=${page}`


];



for(let url of urls){


try{


let html=
await fetchJBZD(url);



let before=
loadedImages.size;



extractImages(html,url);



let after=
loadedImages.size;



console.log(
url,
"obrazy:",
after-before
);



if(after>before)
break;



}catch(e){

console.log(
"Błąd strony",
url,
e
);

}


}



loading=false;



}







document
.getElementById("more")
.onclick=function(){


page++;

loadPage();


};




loadPage();



</script>


</body>
</html>
